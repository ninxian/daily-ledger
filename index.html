<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日業績小帳本</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fff8fb">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #35252b;
      --muted: #725867;
      --line: #f1d7df;
      --pink: #d45883;
      --pink-dark: #b84770;
      --green: #26765f;
      --orange: #b74e31;
      --blue: #3f65a8;
      --bg: #fff8fb;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f1f4;
      color: var(--ink);
      line-height: 1.5;
    }

    button, input { font: inherit; }
    h1, h2, p { margin-top: 0; }
    .hidden { display: none !important; }

    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #fff8fb;
    }

    .login-card {
      width: min(430px, 100%);
      border: 1px solid #f3d8e4;
      border-radius: 18px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 18px 44px rgba(109, 65, 88, .14);
    }

    .login-card::before {
      content: "";
      display: block;
      height: 86px;
      margin: -24px -24px 22px;
      background: linear-gradient(135deg, #ffe8f0 0%, #e8f7f3 55%, #fff5d8 100%);
      border-radius: 18px 18px 0 0;
      border-bottom: 1px solid #f3d8e4;
    }

    .login-card h1 {
      margin-bottom: 8px;
      font-size: clamp(27px, 6vw, 36px);
      letter-spacing: 0;
    }

    .login-card p {
      margin-bottom: 20px;
      color: var(--muted);
      font-weight: 700;
    }

    .app {
      width: min(1180px, 100%);
      max-width: 100%;
      margin: 0 auto;
      padding: 18px;
    }

    .shell {
      overflow: hidden;
      max-width: 100%;
      border: 1px solid #f3d8e4;
      border-radius: 18px;
      background: var(--bg);
      box-shadow: 0 18px 44px rgba(109, 65, 88, .14);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #ffe8f0 0%, #e8f7f3 55%, #fff5d8 100%);
      border-bottom: 1px solid #f3d8e4;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .hero h1 {
      margin-bottom: 0;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: 0;
    }

    .hero p {
      margin-bottom: 0;
      color: var(--muted);
      font-weight: 700;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      align-items: start;
      justify-content: flex-end;
      min-width: 126px;
      align-self: start;
    }

    .logout-top {
      min-width: 72px;
      min-height: 38px;
      padding: 7px 16px;
      border-radius: 13px;
    }

    .badge {
      display: grid;
      place-items: center;
      width: 112px;
      aspect-ratio: 1;
      border: 2px dashed #e69ab5;
      border-radius: 50%;
      background: rgba(255, 255, 255, .72);
      color: #9a4161;
      text-align: center;
      font-weight: 900;
    }


    .body {
      display: grid;
      grid-template-columns: minmax(0, 330px) minmax(0, 1fr);
      gap: 18px;
      padding: 20px;
    }

    .panel {
      min-width: 0;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(150, 91, 120, .08);
    }

    h2 {
      margin-bottom: 14px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .auth-grid, .form-grid { display: grid; gap: 12px; }
    .field label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 900; }
    .input-with-suffix { position: relative; }
    .input-with-suffix input { padding-right: 126px; }
    .suffix {
      position: absolute;
      top: 50%;
      right: 13px;
      transform: translateY(-50%);
      color: #a78a98;
      font-weight: 800;
      pointer-events: none;
    }

    .field input {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      inline-size: 100%;
      min-height: 44px;
      border: 1px solid #efd1da;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fffafd;
      color: #2d2025;
      outline: none;
    }

    .field input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(212, 88, 131, .14);
    }

    .field input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      text-align: left;
    }

    .field input[type="date"]::-webkit-date-and-time-value {
      text-align: left;
      min-width: 0;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      min-height: 44px;
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 900;
      white-space: nowrap;
    }

    .btn.primary { background: var(--pink); color: #fff; }
    .btn.primary:hover { background: var(--pink-dark); }
    .btn.secondary { background: #e7f5f0; color: #2f6658; }
    .logout-top {
      background: transparent !important;
      color: #9b4164;
      border: 1px solid #efb8ca;
      box-shadow: none;
    }
    .logout-top:hover {
      background: #ffeaf1 !important;
      color: #8f3158;
      border-color: #df8cac;
      box-shadow: 0 8px 18px rgba(212, 88, 131, .12);
    }
    .btn.danger { background: #fff0df; color: #9b4e22; }
    .btn:disabled { cursor: not-allowed; opacity: .55; }
    .status { min-height: 24px; margin: 10px 0 0; color: #9b4164; font-size: 14px; font-weight: 800; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      min-height: 108px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 16px;
    }

    .stat:nth-child(1) { background: #f0fbf7; }
    .stat:nth-child(2) { background: #fff4ec; }
    .stat:nth-child(3) { background: #eef4ff; }
    .stat:nth-child(4) { background: #fff0f6; }
    .stat:nth-child(5) { background: #effaf5; }
    .stat:nth-child(6) { background: #f6f1ff; }
    .stat:nth-child(7) { background: #fff9dc; }
    .stat-label { color: #7b6770; font-size: 13px; font-weight: 900; }
    .stat-number { margin: 4px 0 0; font-size: clamp(22px, 4vw, 32px); font-weight: 900; letter-spacing: 0; }
    .stat.sales .stat-number { color: var(--green); }
    .stat.waste .stat-number { color: var(--orange); }
    .stat.visitors .stat-number { color: var(--blue); }

    .list-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
    .list-title { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .list-title h2 { margin: 0; line-height: 1; }
    .list-head .btn { min-height: 38px; padding-top: 7px; padding-bottom: 7px; }
    .month-filter { width: 132px; flex: 0 0 132px; height: 38px; min-height: 38px; border: 1px solid #efd1da; border-radius: 12px; padding: 7px 12px; background: #fffafd; color: #5a3d49; font-weight: 900; outline: none; }
    .month-filter:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(212, 88, 131, .14); }
    .table-wrap { max-width: 100%; overflow-x: auto; border: 1px solid #f0d6de; border-radius: 14px; background: #fff; -webkit-overflow-scrolling: touch; }
    table { width: 100%; min-width: 620px; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #f4e2e8; text-align: left; vertical-align: middle; }
    th { background: #fff7fa; color: #725867; font-size: 13px; font-weight: 900; }
    tbody tr:hover { background: #fffafd; }
    tbody tr:last-child td { border-bottom: 0; }
    .num { font-weight: 900; white-space: nowrap; }
    .sales-text { color: var(--green); }
    .waste-text { color: var(--orange); }
    .visitor-text { color: var(--blue); }
    .actions { display: flex; gap: 7px; align-items: center; }
    .mini { min-height: 34px; border: 1px solid transparent; border-radius: 10px; padding: 6px 10px; cursor: pointer; font-size: 13px; font-weight: 900; }
    .mini.edit { background: #e8f1ff; color: #1f5caa; }
    .mini.delete { background: #ffecea; color: #a5342d; }
    .empty { display: none; border: 1px dashed #e7b8c8; border-radius: 14px; padding: 18px; background: #fffafd; color: #7b6170; text-align: center; font-weight: 800; }
    .empty.show { display: block; }

    @media (max-width: 980px) {
      .body { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .login-screen { padding: 10px; }
      .login-card { padding: 20px; border-radius: 14px; }
      .login-card::before { margin: -20px -20px 18px; border-radius: 14px 14px 0 0; }
      .app { width: 100%; padding: 10px; overflow-x: hidden; }
      .shell { border-radius: 12px; }
      .hero { grid-template-columns: minmax(0, 1fr) auto; padding: 18px; align-items: start; }
      .hero-actions { justify-content: flex-end; width: auto; min-width: 86px; }
      .logout-top { width: auto; min-width: 72px; }
      .badge { width: 86px; }
      .body { grid-template-columns: minmax(0, 1fr); padding: 12px; min-width: 0; width: 100%; }
      .form-grid, .field, .panel, .shell { min-width: 0; max-width: 100%; }
      .field { overflow: hidden; }
      .field input { width: 100%; min-width: 0; max-width: 100%; inline-size: 100%; }
      .table-wrap { width: 100%; max-width: calc(100vw - 44px); }
      .stats { grid-template-columns: 1fr; }
      .btn-row { grid-template-columns: 1fr; }
      .btn:not(.logout-top) { width: 100%; }
      .list-head { display: flex; flex-wrap: nowrap; gap: 6px; align-items: center; }
      .list-title { display: flex; flex: 1 1 auto; min-width: 0; gap: 8px; align-items: center; }
      .list-title h2 { flex: 0 0 auto; font-size: 16px; white-space: nowrap; }
      .month-filter { flex: 0 0 118px; width: 118px; min-width: 118px; height: 36px; padding: 6px 8px; font-size: 13px; }
      .list-head .btn.danger { flex: 0 0 auto; width: auto; min-height: 36px; padding: 6px 9px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <h1>每日小帳本</h1>
      <p>請使用帳號與密碼登入後，記錄每天業績、報廢成本與來客數。</p>
      <form class="auth-grid" id="authForm">
        <div class="field">
          <label for="account">帳號</label>
          <div class="input-with-suffix">
            <input id="account" type="text" autocomplete="username" placeholder="admin" required>
            <span class="suffix">@daily.ledger</span>
          </div>
        </div>
        <div class="field">
          <label for="password">密碼</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="請輸入密碼" minlength="6" required>
        </div>
        <button class="btn primary" id="loginButton" type="submit">登入</button>
      </form>
      <p class="status" id="authStatus"></p>
    </div>
  </section>

  <main class="app hidden" id="app">
    <section class="shell" aria-label="每日業績管理">
      <header class="hero">
        <div class="hero-copy">
          <div class="title-row">
            <h1>每日小帳本</h1>
            <button class="btn logout-top" id="logoutButton" type="button">登出</button>
          </div>
          <p>記錄每天業績、報廢成本與來客數。</p>
        </div>
        <div class="hero-actions">
          <div class="badge"><span id="entryCount">0 筆<br>資料</span></div>
        </div>
      </header>

      <div class="body">
        <aside class="panel">
          <h2 id="formTitle">新增今日紀錄</h2>
          <form class="form-grid" id="entryForm">
            <input type="hidden" id="editId">
            <div class="field"><label for="date">日期</label><input id="date" type="date" required></div>
            <div class="field"><label for="sales">當日業績</label><input id="sales" type="number" min="0" step="1" inputmode="numeric" required></div>
            <div class="field"><label for="waste">當日報廢成本</label><input id="waste" type="number" min="0" step="0.01" inputmode="decimal" required></div>
            <div class="field"><label for="visitors">當日來客數</label><input id="visitors" type="number" min="0" step="1" inputmode="numeric" required></div>
            <div class="btn-row"><button class="btn primary" id="submitButton" type="submit">儲存</button><button class="btn secondary" id="cancelButton" type="button">取消編輯</button></div>
          </form>
        </aside>

        <div>
          <section class="stats" aria-label="統計卡片">
            <article class="stat sales"><div class="stat-label">總業績</div><p class="stat-number" id="totalSales">$0</p></article>
            <article class="stat waste"><div class="stat-label">總報廢成本</div><p class="stat-number" id="totalWaste">$0</p></article>
            <article class="stat visitors"><div class="stat-label">總來客數</div><p class="stat-number" id="totalVisitors">0</p></article>
            <article class="stat sales"><div class="stat-label">平均客單價</div><p class="stat-number" id="avgTicket">$0</p></article>
            <article class="stat sales"><div class="stat-label">平均業績</div><p class="stat-number" id="avgSales">$0</p></article>
            <article class="stat waste"><div class="stat-label">平均報廢成本</div><p class="stat-number" id="avgWaste">$0</p></article>
            <article class="stat visitors"><div class="stat-label">平均來客數</div><p class="stat-number" id="avgVisitors">0</p></article>
          </section>

          <section class="panel">
            <div class="list-head"><div class="list-title"><h2>每日資料列表</h2><select class="month-filter" id="monthFilter" aria-label="選擇月份"></select></div></div>
            <div class="empty" id="emptyState">還沒有資料，先新增今天的紀錄吧。</div>
            <div class="table-wrap">
              <table aria-label="每日資料列表">
                <thead><tr><th>日期</th><th>當日業績</th><th>報廢成本</th><th>來客數</th><th>客單價</th><th>操作</th></tr></thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://snbhjamszmbpinipqjay.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_A_SZMSwqxmJSQYTrFP0TFA_KzFCkJtO";
    const TABLE_NAME = "daily_entries";
    const ACCOUNT_SUFFIX = "@daily.ledger";
    const isConfigured = !SUPABASE_URL.includes("YOUR-PROJECT") && !SUPABASE_ANON_KEY.includes("YOUR-SUPABASE");
    const supabaseClient = isConfigured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    const loginScreen = document.getElementById("loginScreen");
    const app = document.getElementById("app");
    const authForm = document.getElementById("authForm");
    const accountInput = document.getElementById("account");
    const passwordInput = document.getElementById("password");
    const logoutButton = document.getElementById("logoutButton");
    const authStatus = document.getElementById("authStatus");
    const form = document.getElementById("entryForm");
    const editId = document.getElementById("editId");
    const dateInput = document.getElementById("date");
    const salesInput = document.getElementById("sales");
    const wasteInput = document.getElementById("waste");
    const visitorsInput = document.getElementById("visitors");
    const formTitle = document.getElementById("formTitle");
    const submitButton = document.getElementById("submitButton");
    const cancelButton = document.getElementById("cancelButton");
    const monthFilter = document.getElementById("monthFilter");
    const tableBody = document.getElementById("tableBody");
    const emptyState = document.getElementById("emptyState");
    let entries = [];
    let sessionUser = null;
    let selectedMonth = today().slice(0, 7);

    function today() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }
    function money(value, digits = 0) { return new Intl.NumberFormat("zh-TW", { style: "currency", currency: "TWD", minimumFractionDigits: digits, maximumFractionDigits: digits }).format(value || 0); }
    function number(value) { return new Intl.NumberFormat("zh-TW", { maximumFractionDigits: 0 }).format(value || 0); }
    function weekday(dateText) { const day = new Date(dateText + "T00:00:00").getDay(); return ["週日", "週一", "週二", "週三", "週四", "週五", "週六"][day]; }
    function setStatus(message) { authStatus.textContent = message || ""; }
    function setLoading(isLoading) { document.querySelectorAll("button").forEach((button) => button.disabled = isLoading); }
    function accountToEmail() { return accountInput.value.trim() + ACCOUNT_SUFFIX; }
    function emailToAccount(email) { return (email || "").replace(ACCOUNT_SUFFIX, ""); }

    function fillTodayDate() {
      if (!editId.value) dateInput.value = today();
    }

    function resetForm() {
      form.reset();
      editId.value = "";
      fillTodayDate();
      formTitle.textContent = "新增今日紀錄";
      submitButton.textContent = "儲存";
    }

    function currentMonthEntries() {
      return entries.filter((item) => item.entry_date.slice(0, 7) === selectedMonth);
    }

    function totals() {
      const scopedEntries = currentMonthEntries();
      const count = scopedEntries.length;
      const totalSales = scopedEntries.reduce((sum, item) => sum + Number(item.sales || 0), 0);
      const totalWaste = scopedEntries.reduce((sum, item) => sum + Number(item.waste || 0), 0);
      const totalVisitors = scopedEntries.reduce((sum, item) => sum + Number(item.visitors || 0), 0);
      return { count, totalSales, totalWaste, totalVisitors, avgTicket: totalVisitors ? totalSales / totalVisitors : 0, avgSales: count ? totalSales / count : 0, avgWaste: count ? totalWaste / count : 0, avgVisitors: count ? totalVisitors / count : 0 };
    }

    function renderStats() {
      const data = totals();
      document.getElementById("entryCount").innerHTML = number(data.count) + " 筆<br>資料";
      document.getElementById("totalSales").textContent = money(data.totalSales);
      document.getElementById("totalWaste").textContent = money(data.totalWaste, 2);
      document.getElementById("totalVisitors").textContent = number(data.totalVisitors);
      document.getElementById("avgTicket").textContent = money(data.avgTicket);
      document.getElementById("avgSales").textContent = money(data.avgSales);
      document.getElementById("avgWaste").textContent = money(data.avgWaste, 2);
      document.getElementById("avgVisitors").textContent = number(Math.round(data.avgVisitors));
    }

    function monthLabel(monthText) {
      const parts = monthText.split("-");
      return Number(parts[0]) + " 年 " + Number(parts[1]) + " 月";
    }

    function renderMonthFilter() {
      const months = Array.from(new Set([selectedMonth, ...entries.map((item) => item.entry_date.slice(0, 7))])).sort().reverse();
      monthFilter.innerHTML = months.map((month) => {
        const selected = month === selectedMonth ? " selected" : "";
        return '<option value="' + month + '"' + selected + '>' + monthLabel(month) + '</option>';
      }).join("");
    }

    function renderTable() {
      renderMonthFilter();
      const visibleEntries = currentMonthEntries();
      const sorted = [...visibleEntries].sort((a, b) => b.entry_date.localeCompare(a.entry_date));
      tableBody.innerHTML = sorted.map((item) => {
        const ticket = Number(item.visitors) ? Number(item.sales) / Number(item.visitors) : 0;
        return '<tr><td>' + item.entry_date + ' ' + weekday(item.entry_date).replace('週', '') + '</td><td class="num sales-text">' + money(item.sales) + '</td><td class="num waste-text">' + money(item.waste, 2) + '</td><td class="num visitor-text">' + number(item.visitors) + ' 人</td><td class="num sales-text">' + money(ticket) + '</td><td><div class="actions"><button class="mini edit" type="button" data-action="edit" data-id="' + item.id + '">編輯</button><button class="mini delete" type="button" data-action="delete" data-id="' + item.id + '">刪除</button></div></td></tr>';
      }).join("");
      emptyState.textContent = visibleEntries.length === 0 ? monthLabel(selectedMonth) + " 還沒有資料。" : "";
      emptyState.classList.toggle("show", visibleEntries.length === 0);
    }

    function render() { renderStats(); renderTable(); }

    function updateAuthUI() {
      const loggedIn = Boolean(sessionUser);
      loginScreen.classList.toggle("hidden", loggedIn);
      app.classList.toggle("hidden", !loggedIn);
      if (!isConfigured) setStatus("尚未設定 Supabase 連線資訊。");
    }

    async function loadEntries() {
      if (!supabaseClient || !sessionUser) { entries = []; render(); return; }
      setLoading(true);
      const { data, error } = await supabaseClient.from(TABLE_NAME).select("id, entry_date, sales, waste, visitors, created_at").order("entry_date", { ascending: false });
      setLoading(false);
      if (error) { setStatus(error.message); return; }
      entries = data || [];
      render();
    }

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!supabaseClient) return setStatus("請先填入 Supabase URL 與 anon key。");
      setLoading(true);
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email: accountToEmail(), password: passwordInput.value });
      setLoading(false);
      if (error) return setStatus(error.message);
      sessionUser = data.user;
      setStatus("");
      updateAuthUI();
      fillTodayDate();
      await loadEntries();
    });

    logoutButton.addEventListener("click", async () => {
      if (supabaseClient) await supabaseClient.auth.signOut();
      sessionUser = null;
      entries = [];
      passwordInput.value = "";
      resetForm();
      render();
      updateAuthUI();
      setStatus("已登出");
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!supabaseClient || !sessionUser) return setStatus("請先登入。");

      const payload = {
        entry_date: dateInput.value,
        sales: Number(salesInput.value) || 0,
        waste: Number(wasteInput.value) || 0,
        visitors: Number(visitorsInput.value) || 0
      };
      const sameDateEntry = entries.find((item) => item.entry_date === payload.entry_date && item.id !== editId.value);
      let targetId = editId.value;

      if (sameDateEntry) {
        const shouldOverwrite = confirm("這個日期已經有資料了，是否要覆蓋原本資料？");
        if (!shouldOverwrite) return;
        targetId = sameDateEntry.id;
      }

      setLoading(true);
      const result = targetId
        ? await supabaseClient.from(TABLE_NAME).update(payload).eq("id", targetId)
        : await supabaseClient.from(TABLE_NAME).insert(payload);
      setLoading(false);
      if (result.error) return setStatus(result.error.message);
      resetForm();
      await loadEntries();
    });

    tableBody.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const entry = entries.find((item) => item.id === button.dataset.id);
      if (!entry) return;
      if (button.dataset.action === "edit") {
        editId.value = entry.id;
        dateInput.value = entry.entry_date;
        salesInput.value = entry.sales;
        wasteInput.value = entry.waste;
        visitorsInput.value = entry.visitors;
        formTitle.textContent = "編輯每日紀錄";
        submitButton.textContent = "儲存修改";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
      if (button.dataset.action === "delete") {
        if (!confirm("確定要刪除這筆資料嗎？")) return;
        setLoading(true);
        const { error } = await supabaseClient.from(TABLE_NAME).delete().eq("id", entry.id);
        setLoading(false);
        if (error) return setStatus(error.message);
        resetForm();
        await loadEntries();
      }
    });


    monthFilter.addEventListener("change", () => {
      selectedMonth = monthFilter.value;
      render();
    });

    cancelButton.addEventListener("click", resetForm);

    window.addEventListener("pageshow", fillTodayDate);
    window.addEventListener("focus", fillTodayDate);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) fillTodayDate();
    });

    async function init() {
      resetForm();
      render();
      updateAuthUI();
      if (!supabaseClient) return;
      const { data } = await supabaseClient.auth.getSession();
      sessionUser = data.session ? data.session.user : null;
      updateAuthUI();
      await loadEntries();
      supabaseClient.auth.onAuthStateChange((_event, session) => {
        sessionUser = session ? session.user : null;
        updateAuthUI();
        loadEntries();
      });
    }

    init();
  </script>
</body>
</html>
